<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級自治小黑板</title>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        retro: {
                            bg: '#f0e6d2',
                            paper: '#fffbf0',
                            ink: '#2c2c2c',
                            red: '#c0392b',
                            blue: '#2980b9',
                            green: '#27ae60',
                            board: '#2d3436',
                            wood: '#8e44ad',
                            line: '#bdc3c7'
                        }
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px 0px rgba(0,0,0,1)',
                        'hard-sm': '2px 2px 0px 0px rgba(0,0,0,1)',
                        'inner-hard': 'inset 2px 2px 0px 0px rgba(0,0,0,0.1)'
                    },
                    fontFamily: {
                        serif: ['"Noto Serif TC"', '"Songti TC"', 'serif'],
                        mono: ['"Courier New"', 'monospace'],
                        sans: ['"Noto Sans TC"', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <script src="./tailwind.js"></script>
    <script src="./react.development.js"></script>
    <script src="./react-dom.development.js"></script>
    <style>
        body {
            background-color: #f0e6d2;
            background-image:
                linear-gradient(#e5dcc5 1px, transparent 1px),
                linear-gradient(90deg, #e5dcc5 1px, transparent 1px);
            background-size: 20px 20px;
            color: #2c2c2c;
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
        }
        .retro-scrollbar::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }
        .retro-scrollbar::-webkit-scrollbar-track {
            background: #e0d0b0;
            border-left: 2px solid #2c2c2c;
        }
        .retro-scrollbar::-webkit-scrollbar-thumb {
            background: #2c2c2c;
            border: 2px solid #e0d0b0;
        }
        .polaroid {
            background: white;
            padding: 10px 10px 30px 10px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            transition: box-shadow 0.2s, transform 0.1s;
            cursor: grab;
        }
        .polaroid:active {
            cursor: grabbing;
            z-index: 50 !important;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.4);
        }
        .polaroid:hover {
            z-index: 40;
        }
        @keyframes stamp-in {
            0% { opacity: 0; transform: scale(1.5) rotate(15deg); }
            100% { opacity: 1; transform: scale(1) rotate(-5deg); }
        }
        .animate-stamp {
            animation: stamp-in 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        .writing-vertical {
            writing-mode: vertical-rl;
            text-orientation: upright;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <div class="noise-overlay"></div>
    <script src="./routines.app.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自然昆蟲記憶大挑戰 🌿</title>
    <style>
        :root {
            --primary-green: #4CAF50;
            --dark-green: #2E7D32;
            --light-green: #C8E6C9;
            --accent-yellow: #FFF176;
            --bg-color: #F1F8E9;
            --card-back: #81C784;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100-vh;
            color: var(--dark-green);
        }

        header {
            text-align: center;
            padding: 20px;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .game-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 600px;
            width: 95%;
            perspective: 1000px;
        }

        @media (max-width: 400px) {
            .game-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .card {
            aspect-ratio: 3/4;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            transform: rotateY(180deg) scale(0.95);
            opacity: 0.7;
            cursor: default;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            border: 3px solid white;
        }

        .card-front {
            background-color: white;
            transform: rotateY(180deg);
        }

        .card-back {
            background-color: var(--card-back);
            background-image: radial-gradient(var(--primary-green) 20%, transparent 20%);
            background-size: 20px 20px;
        }

        .insect-emoji {
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .insect-name {
            font-size: 1rem;
            font-weight: bold;
        }

        .win-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.2);
            text-align: center;
            z-index: 100;
        }

        button {
            background-color: var(--primary-green);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
        }

        button:hover {
            background-color: var(--dark-green);
            transform: scale(1.05);
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }
    </style>
</head>
<body>

<header>
    <h1>🌿 自然昆蟲小偵探 🐞</h1>
    <p>找出成雙成對的昆蟲朋友們吧！</p>
</header>

<div class="stats">
    <span>步數: <span id="moves">0</span></span>
    <span>時間: <span id="timer">0</span>s</span>
</div>

<div class="game-container" id="gameBoard">
    </div>

<div class="overlay" id="overlay"></div>
<div class="win-message" id="winMessage">
    <h2>🎉 恭喜過關！ 🎉</h2>
    <p id="finalStats"></p>
    <button onclick="resetGame()">再玩一次</button>
</div>

<script>
    const insects = [
        { name: '蝴蝶', emoji: '🦋' },
        { name: '蜜蜂', emoji: '🐝' },
        { name: '獨角仙', emoji: '🛡️' },
        { name: '鍬形蟲', emoji: '✂️' },
        { name: '螞蟻', emoji: '🐜' },
        { name: '蜻蜓', emoji: '🛸' },
        { name: '螳螂', emoji: '🎋' },
        { name: '螢火蟲', emoji: '✨' }
    ];

    let cards = [];
    let flippedCards = [];
    let matchedCount = 0;
    let moves = 0;
    let timer = 0;
    let timerInterval = null;

    function initGame() {
        const gameBoard = document.getElementById('gameBoard');
        gameBoard.innerHTML = '';
        moves = 0;
        timer = 0;
        matchedCount = 0;
        flippedCards = [];
        document.getElementById('moves').textContent = moves;
        document.getElementById('timer').textContent = timer;
        
        // 複製兩份語詞並打亂
        const gameItems = [...insects, ...insects]
            .sort(() => Math.random() - 0.5);

        gameItems.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.name = item.name;
            card.innerHTML = `
                <div class="card-face card-front">
                    <span class="insect-emoji">${item.emoji}</span>
                    <span class="insect-name">${item.name}</span>
                </div>
                <div class="card-face card-back"></div>
            `;
            card.addEventListener('click', () => flipCard(card));
            gameBoard.appendChild(card);
        });

        startTimer();
    }

    function flipCard(card) {
        if (flippedCards.length === 2 || card.classList.contains('flipped') || card.classList.contains('matched')) {
            return;
        }

        card.classList.add('flipped');
        flippedCards.push(card);

        if (flippedCards.length === 2) {
            moves++;
            document.getElementById('moves').textContent = moves;
            checkMatch();
        }
    }

    function checkMatch() {
        const [card1, card2] = flippedCards;
        const isMatch = card1.dataset.name === card2.dataset.name;

        if (isMatch) {
            card1.classList.add('matched');
            card2.classList.add('matched');
            matchedCount += 2;
            flippedCards = [];
            if (matchedCount === insects.length * 2) {
                victory();
            }
        } else {
            setTimeout(() => {
                card1.classList.remove('flipped');
                card2.classList.remove('flipped');
                flippedCards = [];
            }, 1000);
        }
    }

    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timer++;
            document.getElementById('timer').textContent = timer;
        }, 1000);
    }

    function victory() {
        clearInterval(timerInterval);
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('winMessage').style.display = 'block';
        document.getElementById('finalStats').textContent = `你共花了 ${moves} 步，用時 ${timer} 秒！`;
    }

    function resetGame() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('winMessage').style.display = 'none';
        initGame();
    }

    // 啟動遊戲
    initGame();
</script>

</body>
</html>


<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 賽道：時尚超跑實驗室</title>
    <!-- 引入 MediaPipe Pose 必要的函式庫 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-color: #1e272e;
            --ui-blue: #3498db;
            --ui-red: #e74c3c;
            --ui-green: #2ecc71;
            --text-white: #ffffff;
            --panel-height: 600px; /* 統一面板與賽道高度 */
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            overflow-x: hidden;
        }

        h1 {
            margin: 15px 0;
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            text-shadow: 0 0 10px var(--ui-blue);
            text-align: center;
        }

        /* 響應式佈局容器 */
        #app-wrapper {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            align-items: stretch;
            gap: 20px;
            width: 95%;
            max-width: 1100px;
            padding-bottom: 30px;
        }

        /* 左側：控制面板 */
        #control-section {
            flex: 1;
            min-width: 320px;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: var(--panel-height);
        }

        /* 右側：賽車遊戲區 */
        #game-section {
            flex: 1.2;
            display: flex;
            justify-content: center;
            position: relative;
            height: var(--panel-height);
        }

        #camera-container {
            position: relative;
            width: 100%;
            height: 240px;
            border: 2px solid #34495e;
            border-radius: 12px;
            background: #000;
            overflow: hidden;
            flex-shrink: 0;
        }

        #input-video { display: none; }
        #output-canvas {
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }

        .ui-panel {
            background: rgba(44, 62, 80, 0.9);
            padding: 18px;
            border-radius: 12px;
            border-left: 5px solid var(--ui-blue);
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .setting-item {
            margin-bottom: 8px;
        }

        .setting-item label {
            display: block;
            font-size: 13px;
            color: #bdc3c7;
            margin-bottom: 5px;
        }

        .setting-item input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .status-box {
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 8px;
            margin-top: 5px;
        }

        #ai-command {
            font-size: 18px;
            color: #f1c40f;
            font-weight: bold;
            margin: 2px 0;
        }

        #game-canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 400px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            border: 4px solid #34495e;
            border-radius: 12px;
            overflow: hidden;
        }

        canvas#gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #2c3e50;
        }

        .btn {
            background-color: var(--ui-blue);
            border: none;
            color: #fff;
            padding: 10px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .btn-ready {
            animation: pulse-glow 2s infinite;
            background-color: var(--ui-green);
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(46, 204, 113, 0); }
            100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }

        .btn:disabled {
            background-color: #57606f;
            cursor: not-allowed;
            animation: none;
        }

        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            text-align: center;
            border-radius: 15px;
            border: 2px solid var(--ui-red);
            width: 220px;
            z-index: 20;
        }

        #shield-bar-container {
            width: 100%;
            height: 8px;
            background: #1e272e;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }

        #shield-bar {
            width: 100%;
            height: 100%;
            background: var(--ui-green);
            transition: width 0.1s;
        }

        .hint {
            font-size: 11px;
            color: #95afc0;
            margin-top: 8px;
            line-height: 1.3;
        }

        @media (max-width: 768px) {
            #control-section, #game-section {
                height: auto;
                max-width: 100%;
            }
            #game-canvas-container {
                height: 500px;
            }
        }
    </style>
</head>
<body>

    <h1>🏎️ AI 賽車遊戲  </h1>

    <div id="app-wrapper">
        <!-- 左側：設定與攝影機 -->
        <div id="control-section">
            <div id="camera-container">
                <video id="input-video" playsinline></video>
                <canvas id="output-canvas"></canvas>
            </div>
            
            <div class="ui-panel">
                <div class="settings-top">
                    <div class="setting-item">
                        <label>🏎️ 初始速度: <span id="val-speed">6</span></label>
                        <input type="range" id="cfg-speed" min="3" max="15" value="6" oninput="syncConfig()">
                    </div>
                    <div class="setting-item">
                        <label>🚧 障礙物密度 (數值越大越簡單): <span id="val-rate">100</span></label>
                        <input type="range" id="cfg-rate" min="20" max="250" value="100" step="10" oninput="syncConfig()">
                    </div>
                </div>

                <div class="status-center">
                    <button class="btn" id="start-btn" onclick="startCamera()" disabled>等待元件載入...</button>
                    
                    <div class="status-box">
                        <div class="info-label">系統：<span id="status-text" style="color:#f1c40f">初始化中</span></div>
                        <div id="ai-command">指令：WAITING</div>
                    </div>

                    <div class="info-label" style="margin-top:10px;">原力護盾能量：</div>
                    <div id="shield-bar-container"><div id="shield-bar"></div></div>
                </div>

                <div class="hint">
                    🎮 <b>開發者提示：</b><br>
                    • 左右傾斜：轉向 | 雙手高舉：<b>發動護盾</b><br>
                    • 鍵盤：方向鍵 | <b>空白鍵：重新開始</b>
                </div>
            </div>
        </div>

        <!-- 右側：遊戲主畫面 -->
        <div id="game-section">
            <div id="game-canvas-container">
                <canvas id="gameCanvas"></canvas>
                <div id="game-over">
                    <h2 style="color: var(--ui-red); margin-top:0;">💥 撞車了！</h2>
                    <p>里程: <span id="final-score">0</span> m</p>
                    <button class="btn" style="background-color: var(--ui-red);" onclick="resetGame()">重新啟動</button>
                    <p style="font-size: 11px; margin-top: 10px; color: #95afc0;">或按 [空白鍵] 重新開始</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * 1. 遊戲設定
         */
        const GAME_CONFIG = {
            colors: {
                road: "#2f3640",
                grass: "#27ae60",
                carMain: "#e84118",
                carDark: "#c23616",
                cone: "#fbc531",
                line: "#dcdde1"
            },
            speed: { initial: 6, max: 25, step: 0.12 },
            obstacle: { spawnRate: 100, width: 45, height: 45 },
            shield: { duration: 180, cooldown: 400 }
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status-text');
        const startBtn = document.getElementById('start-btn');
        const shieldBar = document.getElementById('shield-bar');
        const aiCommandText = document.getElementById('ai-command');

        canvas.width = 400;
        canvas.height = 600;

        let score = 0;
        let gameActive = true;
        let currentSpeed = GAME_CONFIG.speed.initial;
        let obstacles = [];
        let roadOffset = 0;
        let frameCount = 0;
        let currentAiCommand = "STAY";

        let shieldActive = false;
        let shieldTimer = 0;
        let shieldCooldown = 0;

        const car = {
            x: canvas.width / 2 - 22,
            y: canvas.height - 130,
            width: 44,
            height: 80,
            turnSpeed: 8
        };

        function syncConfig() {
            const speedVal = parseInt(document.getElementById('cfg-speed').value);
            const rateVal = parseInt(document.getElementById('cfg-rate').value);
            document.getElementById('val-speed').innerText = speedVal;
            document.getElementById('val-rate').innerText = rateVal;
            GAME_CONFIG.speed.initial = speedVal;
            GAME_CONFIG.obstacle.spawnRate = rateVal;
            if (score === 0) currentSpeed = speedVal;
        }

        // --- AI 介面函式 ---
        function goLeft() { car.x -= car.turnSpeed; if(car.x < 55) car.x = 55; currentAiCommand = "LEFT ←"; }
        function goRight() { car.x += car.turnSpeed; if(car.x > canvas.width-55-car.width) car.x = canvas.width-55-car.width; currentAiCommand = "RIGHT →"; }
        function stay() { currentAiCommand = "STAY"; }

        /**
         * 2. 控制邏輯
         */
        let pose = null;
        const keys = {};

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Space' && !gameActive) {
                resetGame();
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        window.onload = () => {
            const checkLibs = setInterval(() => {
                if (typeof Pose !== 'undefined' && typeof Camera !== 'undefined') {
                    clearInterval(checkLibs);
                    statusText.innerText = "系統就緒";
                    statusText.style.color = "#2ecc71";
                    startBtn.innerText = "開啟鏡頭感應";
                    startBtn.disabled = false;
                    startBtn.classList.add('btn-ready');
                    initPose();
                }
            }, 500);
            gameLoop();
        };

        function initPose() {
            pose = new Pose({ locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
            pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            pose.onResults(onResults);
        }

        async function startCamera() {
            try {
                startBtn.disabled = true;
                startBtn.classList.remove('btn-ready');
                const videoElement = document.getElementById('input-video');
                const camera = new Camera(videoElement, {
                    onFrame: async () => { await pose.send({image: videoElement}); },
                    width: 320, height: 240
                });
                await camera.start();
                statusText.innerText = "感應啟動";
                startBtn.innerText = "偵測運行中";
            } catch (err) {
                statusText.innerText = "連結失敗";
                startBtn.disabled = false;
            }
        }

        function onResults(results) {
            const canvasElement = document.getElementById('output-canvas');
            const canvasCtx = canvasElement.getContext('2d');
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            
            if (results.poseLandmarks) {
                const lm = results.poseLandmarks;
                const nose = lm[0];
                const leftWrist = lm[15];
                const rightWrist = lm[16];

                if (nose.x > 0.58) goLeft();
                else if (nose.x < 0.42) goRight();
                else stay();

                if (leftWrist.y < nose.y && rightWrist.y < nose.y) {
                    if (shieldCooldown <= 0 && !shieldActive) {
                        shieldActive = true;
                        shieldTimer = GAME_CONFIG.shield.duration;
                        shieldCooldown = GAME_CONFIG.shield.cooldown;
                    }
                }
            }
            canvasCtx.restore();
            aiCommandText.innerText = "指令：" + currentAiCommand;
        }

        /**
         * 3. 繪圖與遊戲循環
         */
        function spawnObstacle() {
            obstacles.push({
                x: 65 + Math.random() * (canvas.width - 130 - GAME_CONFIG.obstacle.width),
                y: -60,
                width: GAME_CONFIG.obstacle.width,
                height: GAME_CONFIG.obstacle.height,
                color: GAME_CONFIG.colors.cone
            });
        }

        function drawTrack() {
            ctx.fillStyle = GAME_CONFIG.colors.grass;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = GAME_CONFIG.colors.road;
            ctx.fillRect(50, 0, canvas.width - 100, canvas.height);
            
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(50, 0, 8, canvas.height);
            ctx.fillRect(canvas.width - 58, 0, 8, canvas.height);

            ctx.strokeStyle = "#ffffff";
            ctx.setLineDash([40, 40]);
            ctx.lineDashOffset = -roadOffset;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            
            roadOffset += currentSpeed;
        }

        function drawCar() {
            ctx.save();
            ctx.translate(car.x + car.width/2, car.y + car.height/2);

            if (shieldActive) {
                ctx.beginPath();
                ctx.arc(0, 0, 60, 0, Math.PI*2);
                const shieldGrd = ctx.createRadialGradient(0,0,30, 0,0,60);
                shieldGrd.addColorStop(0, "transparent");
                shieldGrd.addColorStop(1, "rgba(46, 204, 113, 0.5)");
                ctx.fillStyle = shieldGrd;
                ctx.fill();
                ctx.strokeStyle = "#2ecc71";
                ctx.lineWidth = 3;
                ctx.stroke();
            }

            ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.shadowBlur = 15;
            ctx.shadowOffsetY = 10;

            const carGrd = ctx.createLinearGradient(-car.width/2, 0, car.width/2, 0);
            carGrd.addColorStop(0, GAME_CONFIG.colors.carDark);
            carGrd.addColorStop(0.5, GAME_CONFIG.colors.carMain);
            carGrd.addColorStop(1, GAME_CONFIG.colors.carDark);

            ctx.fillStyle = carGrd;
            ctx.beginPath();
            ctx.moveTo(-car.width*0.35, -car.height/2);
            ctx.quadraticCurveTo(0, -car.height/2 - 8, car.width*0.35, -car.height/2);
            ctx.lineTo(car.width/2, car.height/2 - 10);
            ctx.quadraticCurveTo(0, car.height/2 + 5, -car.width/2, car.height/2 - 10);
            ctx.closePath();
            ctx.fill();

            // 飾條與窗戶
            ctx.fillStyle = "rgba(255,255,255,0.7)";
            ctx.fillRect(-6, -car.height/2, 4, car.height);
            ctx.fillRect(2, -car.height/2, 4, car.height);

            const glassGrd = ctx.createLinearGradient(0, -20, 0, 15);
            glassGrd.addColorStop(0, "#2c3e50");
            glassGrd.addColorStop(1, "#34495e");
            ctx.fillStyle = glassGrd;
            ctx.beginPath();
            ctx.ellipse(0, -5, car.width*0.3, 18, 0, 0, Math.PI*2);
            ctx.fill();

            // 尾翼與輪胎
            ctx.fillStyle = "#1e272e";
            ctx.fillRect(-car.width/2 - 4, car.height/2 - 12, car.width + 8, 8);
            const tireW = 10, tireH = 18;
            ctx.fillRect(-car.width/2 - 2, -car.height/2 + 15, tireW, tireH);
            ctx.fillRect(car.width/2 - 8, -car.height/2 + 15, tireW, tireH);
            ctx.fillRect(-car.width/2 - 2, car.height/2 - 30, tireW, tireH);
            ctx.fillRect(car.width/2 - 8, car.height/2 - 30, tireW, tireH);

            ctx.restore();
        }

        function gameLoop() {
            drawTrack();
            if (gameActive) {
                frameCount++;
                if (frameCount % GAME_CONFIG.obstacle.spawnRate === 0) spawnObstacle();
                if (keys['ArrowLeft']) goLeft();
                if (keys['ArrowRight']) goRight();

                if (shieldActive) {
                    shieldTimer--;
                    shieldBar.style.width = (shieldTimer / GAME_CONFIG.shield.duration * 100) + "%";
                    shieldBar.style.backgroundColor = "#2ecc71";
                    if (shieldTimer <= 0) shieldActive = false;
                } else if (shieldCooldown > 0) {
                    shieldCooldown--;
                    shieldBar.style.width = ((GAME_CONFIG.shield.cooldown - shieldCooldown) / GAME_CONFIG.shield.cooldown * 100) + "%";
                    shieldBar.style.backgroundColor = "#e67e22";
                } else {
                    shieldBar.style.width = "100%";
                    shieldBar.style.backgroundColor = "#2ecc71";
                }

                obstacles.forEach((obs, i) => {
                    obs.y += currentSpeed;
                    ctx.fillStyle = obs.color;
                    ctx.beginPath();
                    ctx.moveTo(obs.x + obs.width/2, obs.y);
                    ctx.lineTo(obs.x, obs.y + obs.height);
                    ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
                    ctx.fill();

                    if (!shieldActive && car.x < obs.x + obs.width && car.x + car.width > obs.x && car.y < obs.y + obs.height && car.y + car.height > obs.y) {
                        gameActive = false;
                        document.getElementById('game-over').style.display = 'block';
                        document.getElementById('final-score').innerText = score;
                    }
                    if (obs.y > canvas.height) { obstacles.splice(i, 1); score += 10; currentSpeed += GAME_CONFIG.speed.step; }
                });
                drawCar();
            }
            ctx.fillStyle = "#fff";
            ctx.font = "bold 22px Arial";
            ctx.fillText("里程: " + score + " m", 65, 45);
            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            score = 0; currentSpeed = GAME_CONFIG.speed.initial; obstacles = [];
            car.x = canvas.width / 2 - 22; shieldActive = false; shieldCooldown = 0;
            gameActive = true; document.getElementById('game-over').style.display = 'none';
        }
    </script>
</body>
</html>
